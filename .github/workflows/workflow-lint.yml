name: Workflow Lint

# Audits the workflows in .github/ for security problems (template injection,
# over-broad token permissions, artifact/credential leaks, etc) with zizmor.
# https://docs.zizmor.sh

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          # advanced-security uploads SARIF to GitHub code scanning, which
          # needs GitHub Advanced Security -- not available here.
          advanced-security: false
          inputs: .github/
